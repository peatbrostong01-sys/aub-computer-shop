<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUB Computer Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <header>

        <div class="logo">
            AUB <span>Computer Shop</span>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="gaming.html">Gaming</a>
            <a href="macbook.html">Macbook</a>

            <a href="contact.html">Contact</a>
        </nav>

        <div class="icon">
            <i class="fa-solid fa-cart-shopping"></i>
            <i class="fa-solid fa-user"></i>
        </div>

    </header>


    <section class="hero">

        <div class="hero-text">
            <h1>Latest Laptop Collection</h1>

            <p>
                Best Gaming, Business and Student laptops. Up to <span>30% OFF</span>
            </p>

            <button>Shop Now</button>

        </div>



    </section>


    <section class="category">

        <h2>Shop By Category</h2>

        <div class="box">

            <div class="card">
                <i class="fa-solid fa-laptop"></i>
                <h3>Gaming</h3>
            </div>

            <div class="card">
                <i class="fa-brands fa-apple"></i>
                <h3>Macbook</h3>
            </div>

            <div class="card">
                <i class="fa-solid fa-briefcase"></i>
                <h3>Business</h3>
            </div>

            <div class="card">
                <i class="fa-solid fa-graduation-cap"></i>
                <h3>Student</h3>
            </div>

        </div>

    </section>





    <footer>

        <p>
            © 2026 AUB Computer Shop | All Rights Reserved
        </p>

    </footer>



</body>

</html>
